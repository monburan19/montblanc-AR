<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wear the program</title>
    <style>
        body {
            background-color: #0ABAB5; /* ティファニーブルー */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        .icon-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            margin-bottom: 25px;
        }
        img { width: 100%; height: 100%; object-fit: cover; }
        .copy { font-weight: 200; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 5px; }
        .brand { font-size: 0.7rem; letter-spacing: 4px; opacity: 0.9; margin-bottom: 40px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="icon-container">
        <img src="IMG_5397.jpg" alt="MONT BLANK"> <!-- 画像名を一致させてください -->
    </div>

    <div class="copy">Wear the program</div>
    <div class="brand">DESIGNED BY MONT BLANK</div>

    <!-- あなたが送ってくれたURLを元に作成したプレイヤー -->
    <iframe style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/3qhlB30KknSejmIvZZLjOD?utm_source=generator&theme=0" 
        width="300" height="80" frameBorder="0" allowfullscreen="" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
    </iframe>

</body>
</html>
